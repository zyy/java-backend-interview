# GitHub Pages 配置
title: Java 后端面试资料库
description: 一份系统、全面的 Java 后端开发面试指南
url: "https://zyy.github.io"
baseurl: "/java-backend-interview"

# 禁用 Jekyll 主题，使用自定义布局
theme: null
remote_theme: null

# Markdown 设置
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# 默认布局
default_layout: default

# 排除文件
exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock

# 包含文件
include:
  - _layouts
  - search_index.json
  - docs/search-bar.js
